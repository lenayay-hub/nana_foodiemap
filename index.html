<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>娜娜的祕密生活圖鑑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #0f172a; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-white antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- SVG 圖示庫 ---
        const Star = ({size=18, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>;
        const Clock = ({size=18, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const DollarSign = ({size=18, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="2" x2="12" y2="22"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>;
        const ImageIcon = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
        const ShoppingBag = ({size=16}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>;
        const Instagram = ({size=16}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>;

        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyKXiPyB0px2WYHW2l2CxeCID-yj2ixog9FezvrPYuzfgX9MSAtRcP-hqj3yQTTBbUi/exec';

        // --- 萬用精美卡片組件 ---
        const UniversalCard = ({ item, type }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [noteContent, setNoteContent] = useState(item.personalNote || '');
            const [isSaving, setIsSaving] = useState(false);

            const handleSaveNote = async () => {
                setIsSaving(true);
                try {
                    const currentTab = type === 'food' ? 'Food' : (type === 'spot' ? 'Spot' : 'Shop');
                    await fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: 'updateNote', rowId: item.id, note: noteContent, tabName: currentTab }) });
                    item.personalNote = noteContent;
                    setIsEditing(false);
                } catch (e) { alert('儲存失敗！'); } finally { setIsSaving(false); }
            };

            // 判斷按鈕文字
            const linkText = type === 'food' ? '在 Google 地圖開啟' : (type === 'spot' ? '在 Google 地圖開啟' : '前往 蝦皮一鍵比價');
            const targetUrl = type === 'shop' ? item.shopeeUrl : item.mapUrl;

            // 霓虹邊框色彩定義
            const accentBorder = type === 'food' ? 'border-l-orange-500' : (type === 'spot' ? 'border-l-purple-500' : 'border-l-emerald-500');

            return (
                <div className={`glass-panel rounded-2xl overflow-hidden relative border-l-4 ${accentBorder} animate-fade-in shadow-2xl mb-6`}>
                    
                    {/* 照片輪播區 */}
                    {item.photoUrls && item.photoUrls.length > 0 ? (
                        <div className="w-full flex overflow-x-auto snap-x snap-mandatory hide-scrollbar p-4 gap-3 bg-slate-800/40 border-b border-slate-700/50">
                            {item.photoUrls.map((url, idx) => (
                                <div key={idx} className="snap-center shrink-0 w-[85%] h-52 rounded-xl overflow-hidden relative shadow-lg border border-slate-700/50">
                                    <img src={url} referrerPolicy="no-referrer" className="w-full h-full object-cover" onError={(e)=>{e.target.style.display='none';}} />
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="w-full h-36 bg-slate-800/30 flex flex-col items-center justify-center border-b border-slate-700/50">
                            <ImageIcon size={28} className="text-slate-600 mb-1" />
                            <span className="text-slate-500 text-xs font-bold tracking-widest">目前沒有照片</span>
                        </div>
                    )}
                    
                    {/* 資訊卡主體 */}
                    <div className="p-5">
                        <h3 className="text-xl font-black text-white mb-4 drop-shadow-md">{item.name}</h3>

                        <div className="space-y-3 text-sm text-gray-300 mb-4">
                            {type !== 'shop' ? (
                                <React.Fragment>
                                    <div className="flex items-center gap-2.5"><Star className="text-yellow-400 fill-yellow-400" /><span><strong>評分：</strong>{item.rating > 0 ? `${item.rating} 顆星` : '尚未評分'}</span></div>
                                    <div className="flex items-center gap-2.5"><Clock className="text-slate-400" /><span><strong>資訊：</strong>{type === 'food' ? `今日 ${item.todayHoursText || '營業中'}` : item.city + item.district}</span></div>
                                    <div className="flex items-center gap-2.5"><DollarSign className="text-orange-300" /><span><strong>預估：</strong>{item.aiData?.exactPrice || '依現場為主'}</span></div>
                                </React.Fragment>
                            ) : (
                                <React.Fragment>
                                    <div className="flex items-center gap-2.5"><Star className="text-emerald-400 fill-emerald-400" /><span><strong>推薦指數：</strong>{item.rating || '4.5/5'}</span></div>
                                    <div className="flex items-center gap-2.5"><Clock className="text-slate-400" /><span><strong>分類標籤：</strong>{item.foodType}</span></div>
                                    <div className="flex items-center gap-2.5"><DollarSign className="text-emerald-300" /><span><strong>合理市價：</strong>{item.priceLevel}</span></div>
                                </React.Fragment>
                            )}
                        </div>

                        {/* AI 深度智慧精華摘要 */}
                        {item.aiData && (
                            <div className="bg-slate-800/40 p-3.5 rounded-xl border border-slate-700/50 space-y-2.5 text-xs text-gray-400">
                                <div><span className="font-bold text-white mr-1.5">{type === 'shop' ? '💡 商品用途:' : '🔥 核心特色:'}</span>{item.aiData.signature}</div>
                                <div><span className="font-bold text-white mr-1.5">{type === 'shop' ? '💬 網路評價:' : '💬 網友心得:'}</span>{item.aiData.review}</div>
                                {type === 'spot' && item.igUrl && (
                                    <div className="pt-2">
                                        <a href={item.igUrl} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1.5 text-purple-400 font-bold hover:text-purple-300">
                                            <Instagram size={14} /> 點此看 Instagram 網美熱門打卡照 📸
                                        </a>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* 個人隨手筆記 */}
                        <div className="mt-4">
                            {isEditing ? (
                                <div className="bg-slate-800/90 p-3 rounded-xl border border-slate-600">
                                    <textarea className="w-full bg-transparent text-xs text-gray-200 outline-none resize-none min-h-[50px]" value={noteContent} onChange={(e)=>setNoteContent(e.target.value)} autoFocus />
                                    <div className="flex justify-end gap-2 mt-1.5">
                                        <button onClick={()=>setIsEditing(false)} className="text-xs text-gray-400 px-2 py-1">取消</button>
                                        <button onClick={handleSaveNote} className="text-xs bg-slate-700 px-3 py-1.5 rounded-lg text-white" disabled={isSaving}>{isSaving?'儲存中...':'儲存'}</button>
                                    </div>
                                </div>
                            ) : (
                                <div className="bg-slate-800/20 hover:bg-slate-800/50 p-2.5 rounded-xl border border-dashed border-slate-700 cursor-pointer text-xs text-gray-400 flex justify-between" onClick={()=>setIsEditing(true)}>
                                    <span className={item.personalNote ? '' : 'italic text-gray-600'}>{item.personalNote || '點此新增私人筆記小筆記...'}</span>
                                    <span className="text-[10px] text-gray-600">編輯</span>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* 底部功能直達按鈕 */}
                    {targetUrl && (
                        <div className="bg-slate-800/60 px-5 py-3.5 border-t border-slate-700/50">
                            <a href={targetUrl} target="_blank" rel="noopener noreferrer" className={`w-full flex justify-center items-center gap-2 text-xs font-bold transition-colors tracking-widest ${type==='shop'?'text-emerald-400':'text-orange-400'}`}>
                                {type === 'shop' && <ShoppingBag size={14} />} {linkText}
                            </a>
                        </div>
                    )}
                </div>
            );
        };

        // --- 主應用大腦 ---
        function App() {
            const [db, setDb] = useState({ food: [], spot: [], shop: [] });
            const [currentTab, setCurrentTab] = useState('food'); // 'food', 'spot', 'shop'
            const [isLoading, setIsLoading] = useState(true);

            useEffect(() => {
                fetch(GAS_API_URL).then(res => res.json()).then(data => {
                    const formatSection = (list, isShop=false) => (list || []).map(item => {
                        let aiObj = null;
                        try { if(item['AI總結']) aiObj = JSON.parse(item['AI總結']); } catch(e){}
                        let photoArr = [];
                        try { if(item['照片網址']) photoArr = JSON.parse(item['照片網址']); } catch(e){}

                        return {
                            id: item.id,
                            name: item['店名'] || item['景點名稱'] || item['商品名稱'] || '未命名項目',
                            city: item['縣市'] || '',
                            district: item['區域'] || '',
                            foodType: item['類型'] || item['分類'] || '',
                            priceLevel: item['價位'] || item['預估價格'] || '',
                            rating: parseFloat(item['Google評分'] || item['推薦指數']) || 0,
                            mapUrl: item['地圖連結'] || '',
                            shopeeUrl: item['蝦皮連結'] || '',
                            igUrl: item['IG連結'] || '',
                            photoUrls: photoArr,
                            aiData: aiObj,
                            personalNote: item['個人註解'] || '',
                            todayHoursText: item['營業時間'] ? '有資料' : ''
                        };
                    }).reverse();

                    setDb({
                        food: formatSection(data.food),
                        spot: formatSection(data.spot),
                        shop: formatSection(data.shop)
                    });
                    setIsLoading(false);
                }).catch(()=>{ setIsLoading(false); });
            }, []);

            const currentList = db[currentTab] || [];

            return (
                <div className="min-h-screen bg-slate-900 pb-12">
                    {/* 頂部霓虹導航切換列 */}
                    <div className="sticky top-0 z-50 glass-panel border-b border-slate-800 px-4 py-3 flex justify-around items-center">
                        <button onClick={()=>setCurrentTab('food')} className={`text-sm font-black px-4 py-2 rounded-full transition-all tracking-wider ${currentTab==='food'?'bg-orange-500 text-white shadow-lg shadow-orange-500/30':'text-gray-400'}`}>🍽️ 美食特搜</button>
                        <button onClick={()=>setCurrentTab('spot')} className={`text-sm font-black px-4 py-2 rounded-full transition-all tracking-wider ${currentTab==='spot'?'bg-purple-500 text-white shadow-lg shadow-purple-500/30':'text-gray-400'}`}>📸 仙女打卡</button>
                        <button onClick={()=>setCurrentTab('shop')} className={`text-sm font-black px-4 py-2 rounded-full transition-all tracking-wider ${currentTab==='shop'?'bg-emerald-500 text-white shadow-lg shadow-emerald-500/30':'text-gray-400'}`}>🛍️ 購物比價</button>
                    </div>

                    <div className="max-w-md mx-auto px-4 pt-6">
                        {isLoading ? (
                            <div className="text-center py-20 text-sm text-gray-500">🪄 AI 大腦正在努力翻找娜娜的祕密抽屜...</div>
                        ) : currentList.length === 0 ? (
                            <div className="text-center py-20 text-sm text-gray-600 glass-panel rounded-2xl">這裡目前還是空的喔！快去 LINE 丟內容進來吧 ✨</div>
                        ) : (
                            currentList.map(item => <UniversalCard key={item.id} item={item} type={currentTab} />)
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
