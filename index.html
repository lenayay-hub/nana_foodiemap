<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>娜娜的全能生活圖鑑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #0f172a;
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-white antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const MapPin = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 0-16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>;
        const Star = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>;
        const Clock = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const DollarSign = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="22"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>;
        const RefreshCcw = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const MessageSquare = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>;
        const Lightbulb = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.3 1.5 1.5 2.5"></path><path d="M9 18h6"></path><path d="M10 22h4"></path></svg>;
        const Edit3 = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>;
        const Save = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;
        const ImageIcon = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
        const ShoppingBag = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>;
        const Search = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const Instagram = ({size=16}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>;
        const ShoppingCart = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>;
        // 新增的垃圾桶 Icon
        const Trash2 = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;

        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyKXiPyB0px2WYHW2l2CxeCID-yj2ixog9FezvrPYuzfgX9MSAtRcP-hqj3yQTTBbUi/exec';

        const categoriesData = {
            food: [
                { name: "日式", emoji: "🍣" }, { name: "台式", emoji: "🥘" }, { name: "韓式", emoji: "🌶️" },
                { name: "美式", emoji: "🍔" }, { name: "義式", emoji: "🍝" }, { name: "早午餐", emoji: "🥞" },
                { name: "咖啡廳", emoji: "☕" }, { name: "甜點", emoji: "🍰" }, { name: "火鍋", emoji: "🍲" },
                { name: "燒肉", emoji: "🥩" }, { name: "餐酒館", emoji: "🍷" }, { name: "小吃", emoji: "🥡" }, { name: "其他", emoji: "🍽️" }
            ],
            spot: [
                { name: "自然風景", emoji: "⛰️" }, { name: "歷史古蹟", emoji: "🏛️" }, { name: "網美打卡", emoji: "✨" },
                { name: "展覽藝文", emoji: "🎨" }, { name: "休閒娛樂", emoji: "🎬" }, { name: "其他", emoji: "📍" }
            ],
            shop: [
                { name: "美妝保養", emoji: "💄" }, { name: "3C家電", emoji: "💻" }, { name: "服飾配件", emoji: "👕" },
                { name: "生活居家", emoji: "🛋️" }, { name: "食品伴手禮", emoji: "🎁" }, { name: "工作", emoji: "📦" }, { name: "其他", emoji: "📦" }
            ]
        };

        const getEmoji = (tab, typeName) => {
            const list = categoriesData[tab] || [];
            const found = list.find(c => c.name === typeName);
            return found ? `${typeName} ${found.emoji}` : typeName;
        };

        const checkIsOpenNow = (hoursJson) => {
            if (!hoursJson) return null;
            try {
                const hours = JSON.parse(hoursJson);
                if (!hours || !hours.periods) return null;
                const twTime = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Taipei"}));
                const currentDay = twTime.getDay();
                const currentTimeVal = twTime.getHours() * 100 + twTime.getMinutes();
                for (const period of hours.periods) {
                    if (period.open && !period.close) return true;
                    const openDay = period.open.day, openTime = period.open.hour * 100 + period.open.minute;
                    const closeDay = period.close.day, closeTime = period.close.hour * 100 + period.close.minute;
                    if (openDay === closeDay) {
                        if (currentDay === openDay && currentTimeVal >= openTime && currentTimeVal < closeTime) return true;
                    } else {
                        if (currentDay === openDay && currentTimeVal >= openTime) return true;
                        if (currentDay === closeDay && currentTimeVal < closeTime) return true;
                    }
                }
                return false;
            } catch (e) { return null; }
        };

        const getTodayHoursText = (hoursJson) => {
            if (!hoursJson) return '未提供營業時間';
            try {
                const hours = JSON.parse(hoursJson);
                if (hours.weekdayDescriptions && hours.weekdayDescriptions.length > 0) {
                    const twTime = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Taipei"}));
                    let dayIndex = twTime.getDay() - 1;
                    if (dayIndex === -1) dayIndex = 6;  
                    const desc = hours.weekdayDescriptions[dayIndex];
                    const splitIndex = desc.indexOf(':') !== -1 ? desc.indexOf(':') : desc.indexOf('：');
                    return splitIndex !== -1 ? desc.substring(splitIndex + 1).trim() : desc;
                }
            } catch(e) {}
            return '依現場公告為主';
        };

        // 修改：加入 onUpdate, onDelete 屬性接收
        const UniversalCard = ({ item, type, onUpdate, onDelete }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [noteContent, setNoteContent] = useState(item.personalNote || '');
            const [isSaving, setIsSaving] = useState(false);
            
            // 新增的 state：錯誤提示、分類編輯、刪除狀態
            const [errorMsg, setErrorMsg] = useState("");
            const [isEditingCategory, setIsEditingCategory] = useState(false);
            const [isDeleting, setIsDeleting] = useState(false);
            const [deleteConfirm, setDeleteConfirm] = useState(false);

            const handleSaveNote = async () => {
                setIsSaving(true);
                setErrorMsg("");
                try {
                    const tabName = type === 'food' ? 'Food' : (type === 'spot' ? 'Spot' : 'Shop');
                    await fetch(GAS_API_URL, {
                        method: 'POST', body: JSON.stringify({ action: 'updateNote', rowId: item.id, note: noteContent, tabName: tabName })
                    });
                    item.personalNote = noteContent;
                    setIsEditing(false);
                } catch (error) {
                    // 修改：改用優雅的提示而非 alert()
                    setErrorMsg('儲存失敗，請確認網路連線！'); 
                } finally {
                    setIsSaving(false);
                }
            };

            // 新增：儲存分類修改邏輯，並通知 App 更新資料觸發篩選連動
            const handleSaveCategory = async (newCategory) => {
                try {
                    setIsEditingCategory(false);
                    await fetch(GAS_API_URL, {
                        method: 'POST', body: JSON.stringify({ action: 'updateCategory', rowId: item.id, category: newCategory })
                    });
                    if(onUpdate) onUpdate(type, item.id, { foodType: newCategory }); 
                } catch (error) {
                    setErrorMsg('分類更新失敗！');
                }
            };

            // 新增：刪除項目邏輯，通知 App 從清單移除
            const handleDelete = async () => {
                setIsDeleting(true);
                try {
                    await fetch(GAS_API_URL, {
                        method: 'POST', body: JSON.stringify({ action: 'deleteItem', rowId: item.id, tabName: 'Shop' })
                    });
                    if(onDelete) onDelete(type, item.id);
                } catch (error) {
                    setErrorMsg('刪除失敗，請確認網路連線！');
                    setIsDeleting(false);
                    setDeleteConfirm(false);
                }
            };

            let priceDisplay = 'NT$ 不明';
            if (item.aiData && item.aiData.exactPrice && item.aiData.exactPrice !== "依現場為主") {
                priceDisplay = item.aiData.exactPrice;
            } else {
                const num = item.priceLevel;
                if (num === 1) priceDisplay = '約 NT$100-300';
                else if (num === 2) priceDisplay = '約 NT$300-800';
                else if (num === 3) priceDisplay = '約 NT$800-1500';
                else if (num >= 4) priceDisplay = 'NT$1500+';
            }

            const accentBorder = type === 'food' ? 'border-l-orange-500' : (type === 'spot' ? 'border-l-purple-500' : 'border-l-emerald-500');
            const safeShopeeUrl = item.shopeeUrl ? item.shopeeUrl : `https://shopee.tw/search?keyword=${encodeURIComponent(item.name)}`;
            const googleImageUrl = `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(item.name)}`;

            return (
                <div className={`glass-panel rounded-2xl overflow-hidden relative border-l-4 ${accentBorder} animate-fade-in group shadow-2xl mb-8`}>
                    
                    {item.photoUrls && item.photoUrls.length > 0 ? (
                        <div className="w-full flex overflow-x-auto snap-x snap-mandatory hide-scrollbar p-4 gap-3 bg-slate-800/40 border-b border-slate-700/50">
                            {item.photoUrls.map((url, index) => (
                                <div key={index} className="snap-center shrink-0 w-[85%] h-52 rounded-xl overflow-hidden relative shadow-lg border border-slate-700/50">
                                    <img src={url} referrerPolicy="no-referrer" className="w-full h-full object-cover" alt={`照片 ${index + 1}`} onError={(e) => { e.target.style.display = 'none'; }} />
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="w-full h-32 bg-slate-800/30 flex flex-col items-center justify-center border-b border-slate-700/50 text-slate-500">
                            {type === 'shop' ? (
                                <div className="text-center">
                                    <ShoppingBag size={28} className="mx-auto mb-2 opacity-50 text-emerald-600" />
                                    <span className="text-xs font-bold tracking-widest text-emerald-600/70">點擊下方方位搜尋商品圖片</span>
                                </div>
                            ) : (
                                <div className="text-center">
                                    <ImageIcon size={28} className="mx-auto mb-2 opacity-50" />
                                    <span className="text-xs font-bold tracking-widest">目前沒有照片</span>
                                </div>
                            )}
                        </div>
                    )}
                    
                    <div className="p-5">
                        <div className="flex justify-between items-start mb-6">
                            <h3 className="text-2xl font-extrabold text-white pr-4 drop-shadow-md">{item.name}</h3>
                            <div className="flex flex-col items-end gap-1 shrink-0">
                                {item.isHidden && type !== 'shop' && <span className="bg-red-500/20 text-red-400 border border-red-500/30 text-[10px] font-bold px-2 py-1 rounded-full">隱藏版</span>}
                                {item.isOpenNow === true && type !== 'shop' && <span className="bg-green-500/20 text-green-400 border border-green-500/30 text-[10px] font-bold px-2 py-1 rounded-full flex items-center gap-1"><span className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> 營業中</span>}
                                {item.isOpenNow === false && type !== 'shop' && <span className="bg-gray-500/20 text-gray-400 border border-gray-500/30 text-[10px] font-bold px-2 py-1 rounded-full">休息中</span>}
                                
                                {/* 新增：購物模式專屬防呆刪除按鈕 */}
                                {type === 'shop' && (
                                    deleteConfirm ? (
                                        <div className="flex gap-2 bg-slate-800 p-1.5 rounded-lg border border-red-500/30 shadow-lg">
                                            <button onClick={handleDelete} className="text-[10px] font-bold bg-red-500/80 text-white px-2 py-1 rounded hover:bg-red-500 transition-colors" disabled={isDeleting}>{isDeleting ? '刪除中...' : '確定刪除'}</button>
                                            <button onClick={() => setDeleteConfirm(false)} className="text-[10px] font-bold bg-gray-600/80 text-white px-2 py-1 rounded hover:bg-gray-500 transition-colors" disabled={isDeleting}>取消</button>
                                        </div>
                                    ) : (
                                        <button onClick={() => setDeleteConfirm(true)} className="text-xs text-gray-500 hover:text-red-400 p-1.5 rounded-full hover:bg-red-500/10 transition-colors" title="刪除商品">
                                            <Trash2 size={16} />
                                        </button>
                                    )
                                )}
                            </div>
                        </div>

                        {/* 新增：錯誤訊息提示區域 */}
                        {errorMsg && <div className="mb-4 text-xs text-red-400 bg-red-500/10 p-2 rounded border border-red-500/20">{errorMsg}</div>}

                        <div className="space-y-4 mb-4">
                            {type !== 'shop' ? (
                                <React.Fragment>
                                    <div className="flex items-center gap-3 text-sm text-gray-300">
                                        <Star size={18} className={`${type==='food'?'text-yellow-400 fill-yellow-400':'text-purple-400 fill-purple-400'} shrink-0`} />
                                        <span><strong className="text-white tracking-wide">Google 評分：</strong>{item.rating > 0 ? `${item.rating} 顆星` : '尚未評分'}</span>
                                    </div>
                                    <div className="flex items-center gap-3 text-sm text-gray-300">
                                        <Clock size={18} className="text-gray-400 shrink-0" />
                                        <span><strong className="text-white tracking-wide">營業時間：</strong>今日 {item.todayHoursText}</span>
                                    </div>
                                    <div className="flex items-center gap-3 text-sm text-gray-300">
                                        <DollarSign size={18} className={`${type==='food'?'text-orange-300':'text-purple-300'} shrink-0`} />
                                        <span><strong className="text-white tracking-wide">{type==='food'?'預估價位':'門票資訊'}：</strong>{priceDisplay}</span>
                                    </div>
                                </React.Fragment>
                            ) : (
                                <React.Fragment>
                                    <div className="flex items-center gap-3 text-sm text-gray-300">
                                        <Star size={18} className="text-emerald-400 fill-emerald-400 shrink-0" />
                                        <span><strong className="text-white tracking-wide">推薦指數：</strong>{item.rating || '4.5/5'}</span>
                                    </div>
                                    <div className="flex items-center gap-3 text-sm text-gray-300">
                                        <ShoppingBag size={18} className="text-gray-400 shrink-0" />
                                        <div className="flex items-center gap-2">
                                            <strong className="text-white tracking-wide">分類標籤：</strong>
                                            {/* 新增：實作可點擊切換的分類選單 */}
                                            {isEditingCategory ? (
                                                <select
                                                    className="bg-slate-700 text-white rounded px-2 py-1 outline-none text-xs border border-emerald-500/50 focus:border-emerald-500"
                                                    value={item.foodType}
                                                    onChange={(e) => handleSaveCategory(e.target.value)}
                                                    onBlur={() => setIsEditingCategory(false)}
                                                    autoFocus
                                                >
                                                    {categoriesData['shop'].map(c => (
                                                        <option key={c.name} value={c.name}>{c.name}</option>
                                                    ))}
                                                </select>
                                            ) : (
                                                <span className="flex items-center gap-2 group cursor-pointer hover:text-emerald-300 transition-colors" onClick={() => setIsEditingCategory(true)} title="點擊修改分類">
                                                    {getEmoji('shop', item.foodType)}
                                                    <Edit3 size={12} className="text-gray-500 opacity-0 group-hover:opacity-100 transition-opacity" />
                                                </span>
                                            )}
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-3 text-sm text-gray-300">
                                        <DollarSign size={18} className="text-emerald-300 shrink-0" />
                                        <span><strong className="text-white tracking-wide">合理市價：</strong>{item.priceLevel}</span>
                                    </div>
                                </React.Fragment>
                            )}
                        </div>

                        {/* 🔥 深度分析情報 */}
                        <div className="space-y-5 border-t border-slate-700/50 pt-5">
                            {item.aiData && typeof item.aiData === 'object' ? (
                                <React.Fragment>
                                    {/* 🛒 購物專屬：在哪裡買的深度分析 */}
                                    {type === 'shop' && item.aiData.whereToBuy && (
                                        <div className="bg-emerald-900/30 border border-emerald-500/30 rounded-xl p-4 mt-2 mb-4 relative overflow-hidden shadow-inner">
                                            <div className="absolute top-0 left-0 w-1 h-full bg-emerald-500"></div>
                                            <div className="flex items-center gap-2 mb-2 text-emerald-400 font-bold">
                                                <ShoppingCart size={16} /> 深度通路情報
                                            </div>
                                            <div className="text-sm text-emerald-50/90 leading-relaxed whitespace-pre-wrap">
                                                {item.aiData.whereToBuy}
                                            </div>
                                        </div>
                                    )}

                                    {item.aiData.signature && (
                                        <div className="flex items-start gap-3">
                                            <div className="bg-slate-700/50 p-1.5 rounded-full mt-0.5"><Star size={14} className={type==='food'?'text-orange-400':(type==='spot'?'text-purple-400':'text-emerald-400')} /></div>
                                            <div className="leading-relaxed">
                                                <span className="text-sm font-bold text-white mr-2">{type==='food'?'必點招牌：':(type==='spot'?'打卡亮點：':'商品用途：')}</span>
                                                <span className="text-sm text-gray-400">{item.aiData.signature}</span>
                                            </div>
                                        </div>
                                    )}
                                    {item.aiData.review && (
                                        <div className="flex items-start gap-3">
                                            <div className="bg-blue-500/20 p-1.5 rounded-full mt-0.5"><MessageSquare size={14} className="text-blue-400" /></div>
                                            <div className="leading-relaxed">
                                                <span className="text-sm font-bold text-white mr-2">{type==='shop'?'網路評價：':'評論摘要：'}</span>
                                                <span className="text-sm text-gray-400">{item.aiData.review}</span>
                                            </div>
                                        </div>
                                    )}
                                    {item.aiData.reason && type === 'spot' && (
                                        <div className="flex items-start gap-3">
                                            <div className="bg-yellow-500/20 p-1.5 rounded-full mt-0.5"><Lightbulb size={14} className="text-yellow-400" /></div>
                                            <div className="leading-relaxed">
                                                <span className="text-sm font-bold text-white mr-2">貼心提醒：</span>
                                                <span className="text-sm text-gray-400">{item.aiData.reason}</span>
                                            </div>
                                        </div>
                                    )}
                                </React.Fragment>
                            ) : (
                                item.aiData && <p className="text-sm text-gray-400 italic">" {item.aiData} "</p>
                            )}

                            {type === 'spot' && item.igUrl && (
                                <div className="mt-4 pt-2">
                                    <a href={item.igUrl} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 bg-purple-600/20 text-purple-400 border border-purple-500/30 px-3 py-1.5 rounded-lg text-sm font-bold hover:bg-purple-600/40 transition-colors">
                                        <Instagram size={16} /> 點此看 IG 網美熱門打卡照 📸
                                    </a>
                                </div>
                            )}
                        </div>
                        
                        <div className="mt-5 pt-5 border-t border-slate-700/50">
                            {isEditing ? (
                                <div className="bg-slate-800/80 p-3 rounded-xl border border-slate-600">
                                    <textarea className="w-full bg-transparent text-sm text-gray-200 outline-none resize-none placeholder-gray-500 min-h-[60px]" placeholder="寫下你的評語或紀錄..." value={noteContent} onChange={(e) => setNoteContent(e.target.value)} autoFocus />
                                    <div className="flex justify-end gap-2 mt-2">
                                        <button onClick={() => setIsEditing(false)} className="text-xs text-gray-400 px-3 py-1 hover:text-white" disabled={isSaving}>取消</button>
                                        <button onClick={handleSaveNote} className="flex items-center gap-1 text-xs bg-slate-700 text-white px-3 py-1.5 rounded-lg hover:bg-slate-600 disabled:opacity-50" disabled={isSaving}>{isSaving ? '儲存中...' : <React.Fragment><Save size={12} /> 儲存</React.Fragment>}</button>
                                    </div>
                                </div>
                            ) : (
                                <div className="bg-slate-800/40 hover:bg-slate-800/80 p-3 rounded-xl border border-dashed border-slate-600/50 cursor-text transition-colors group flex items-start justify-between gap-2" onClick={() => setIsEditing(true)}>
                                    <div className="flex items-start gap-2 text-sm text-gray-300">
                                        <Edit3 size={14} className="text-gray-500 mt-0.5 shrink-0" />
                                        <span className={item.personalNote ? '' : 'text-gray-500 italic'}>{item.personalNote || '點此新增個人筆記...'}</span>
                                    </div>
                                    <span className="text-[10px] text-gray-500 opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pt-0.5">編輯</span>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* 🔥 底部按鈕 */}
                    {type === 'shop' ? (
                        <div className="bg-slate-800/80 flex flex-col border-t border-slate-700/50">
                            <a href={safeShopeeUrl} target="_blank" rel="noopener noreferrer" className="w-full flex justify-center items-center gap-2 text-sm font-bold text-emerald-400 hover:text-emerald-300 py-4 border-b border-slate-700/50 transition-colors tracking-widest bg-emerald-900/10">
                                <ShoppingBag size={18} /> 前往蝦皮一鍵比價
                            </a>
                            <a href={googleImageUrl} target="_blank" rel="noopener noreferrer" className="w-full flex justify-center items-center gap-2 text-xs font-bold text-gray-400 hover:text-white py-3.5 transition-colors tracking-widest">
                                <Search size={14} className="text-blue-400" /> Google 圖片搜尋
                            </a>
                        </div>
                    ) : (
                        !item.isHidden && item.mapUrl && (
                            <div className="bg-slate-800/80 px-5 py-4 border-t border-slate-700/50">
                                <a href={item.mapUrl} target="_blank" rel="noopener noreferrer" className={`w-full flex justify-center items-center gap-2 text-sm font-bold transition-colors tracking-widest ${type==='spot'?'text-purple-400 hover:text-purple-300':'text-orange-400 hover:text-orange-300'}`}>
                                    <MapPin size={16} /> 在 Google 地圖開啟
                                </a>
                            </div>
                        )
                    )}
                </div>
            );
        };

        function App() {
            const [db, setDb] = useState({ food: [], spot: [], shop: [] });
            const [isLoading, setIsLoading] = useState(true);
            const [hasSearched, setHasSearched] = useState(false);
            const [fetchError, setFetchError] = useState(null);

            const [currentTab, setCurrentTab] = useState('food');
            const [selectedCity, setSelectedCity] = useState('');
            const [selectedDistrict, setSelectedDistrict] = useState('');
            const [selectedFoodType, setSelectedFoodType] = useState('');
            const [isHiddenGem, setIsHiddenGem] = useState(false);
            const [isOpenNow, setIsOpenNow] = useState(false);

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const response = await fetch(GAS_API_URL);
                        if (!response.ok) throw new Error("網路連線異常");
                        const data = await response.json();
                        
                        const formatData = (list) => (list || []).map(item => {
                            let aiSummaryData = null;
                            const rawAiText = item['AI總結'] || '';
                            if (rawAiText.startsWith('{') && rawAiText.endsWith('}')) {
                                try { aiSummaryData = JSON.parse(rawAiText); } catch(e) {}
                            }
                            
                            let rawPhotoUrls = item['照片網址'] || item['照片'] || '';
                            if (!rawPhotoUrls) {
                                const vals = Object.values(item);
                                if (vals.length > 10) rawPhotoUrls = vals[10];
                            }
                            
                            let parsedPhotoUrls = [];
                            
                            // 🌟 防盜鏈轉換核心邏輯 (完全保留)
                            if (typeof rawPhotoUrls === 'string' && rawPhotoUrls.startsWith('[')) {
                                try { 
                                    let tempUrls = JSON.parse(rawPhotoUrls); 
                                    parsedPhotoUrls = tempUrls.map(url => 
                                        url.includes('drive.google.com/uc?id=') 
                                            ? url.replace('/uc?id=', '/thumbnail?id=') + '&sz=w1000' 
                                            : url
                                    );
                                } catch(e) {}
                            } else if (typeof rawPhotoUrls === 'string' && rawPhotoUrls.startsWith('http')) {
                                let singleUrl = rawPhotoUrls;
                                if (singleUrl.includes('drive.google.com/uc?id=')) {
                                    singleUrl = singleUrl.replace('/uc?id=', '/thumbnail?id=') + '&sz=w1000';
                                }
                                parsedPhotoUrls = [singleUrl];
                            }

                            const isHidden = !item['地圖連結'] || item['地圖連結'] === "";
                            
                            return {
                                id: item.id,
                                name: item['店名'] || item['景點名稱'] || item['商品名稱'] || '未命名項目',
                                city: item['縣市'] || '',
                                district: item['區域'] || '',
                                foodType: item['類型'] || item['分類'] || '其他',
                                priceLevel: item['價位'] || item['預估價格'] || 2,
                                rating: parseFloat(item['Google評分'] || item['推薦指數']) || 0,
                                mapUrl: item['地圖連結'] || '',
                                shopeeUrl: item['蝦皮連結'] || '',
                                photoUrls: parsedPhotoUrls,
                                isHidden: isHidden,
                                aiData: aiSummaryData || rawAiText,
                                personalNote: item['個人註解'] || '',
                                isOpenNow: checkIsOpenNow(item['營業時間']),
                                todayHoursText: getTodayHoursText(item['營業時間']),
                                igUrl: item['IG連結'] || ''
                            };
                        }).filter(item => item.name !== '未命名項目' && item.name !== '');

                        if (Array.isArray(data)) {
                            setDb({ food: formatData(data).reverse(), spot: [], shop: [] });
                        } else {
                            setDb({ food: formatData(data.food).reverse(), spot: formatData(data.spot).reverse(), shop: formatData(data.shop).reverse() });
                        }
                    } catch (err) {
                        setFetchError("無法取得資料庫列表");
                    } finally {
                        setIsLoading(false);
                    }
                };
                fetchData();
            }, []);

            // 新增：在 App 層級提供狀態更新的方法，確保改完分類後搜尋列無縫連動
            const handleUpdateItem = (type, id, newFields) => {
                setDb(prev => {
                    const newList = prev[type].map(item => item.id === id ? { ...item, ...newFields } : item);
                    return { ...prev, [type]: newList };
                });
            };

            // 新增：在 App 層級提供狀態刪除的方法
            const handleDeleteItem = (type, id) => {
                setDb(prev => {
                    const newList = prev[type].filter(item => item.id !== id);
                    return { ...prev, [type]: newList };
                });
            };

            const currentList = db[currentTab] || [];

            const availableCities = useMemo(() => [...new Set(currentList.map(r => r.city).filter(c => c && c !== '隱藏版' && c !== '未知'))].sort(), [currentList]);
            const availableDistricts = useMemo(() => !selectedCity ? [] : [...new Set(currentList.filter(r => r.city === selectedCity).map(r => r.district).filter(d => d && d !== '未知區域'))].sort(), [currentList, selectedCity]);

            const filteredItems = useMemo(() => {
                return currentList.filter(item => {
                    if (currentTab !== 'shop') {
                        if (isHiddenGem) {
                            if (!item.isHidden) return false;
                        } else {
                            if (item.isHidden) return false;
                            if (selectedCity && item.city !== selectedCity) return false;
                            if (selectedDistrict && item.district !== selectedDistrict) return false;
                            if (selectedFoodType && item.foodType !== selectedFoodType) return false;
                            if (isOpenNow && item.isOpenNow !== true) return false;
                        }
                    } else {
                        if (selectedFoodType && item.foodType !== selectedFoodType) return false;
                    }
                    return true;
                });
            }, [currentList, currentTab, selectedCity, selectedDistrict, selectedFoodType, isHiddenGem, isOpenNow]);

            const handleTabChange = (tab) => {
                setCurrentTab(tab);
                setSelectedCity('');
                setSelectedDistrict('');
                setSelectedFoodType('');
                setIsHiddenGem(false);
                setIsOpenNow(false);
                setHasSearched(false);
            };

            const theme = currentTab === 'food' ? 'orange' : (currentTab === 'spot' ? 'purple' : 'emerald');

            return (
                <div className={`relative min-h-screen bg-slate-900 selection:bg-${theme}-500 selection:text-white pb-12`}>
                    <div className="fixed inset-0 z-0 pointer-events-none">
                        <img src="https://images.unsplash.com/photo-1514933651103-005eec06c04b?auto=format&fit=crop&q=80&w=1920" className="w-full h-full object-cover opacity-20" alt="background" />
                        <div className="absolute inset-0 bg-gradient-to-b from-slate-900/60 via-slate-900/80 to-slate-900"></div>
                    </div>

                    <div className="relative z-10 max-w-md mx-auto px-5 pt-8">
                        
                        <div className="flex justify-center gap-3 mb-8">
                            <button onClick={()=>handleTabChange('food')} className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all shadow-lg ${currentTab==='food' ? 'bg-orange-500 text-white shadow-orange-500/40' : 'bg-slate-800/60 text-gray-400 border border-slate-700'}`}>🍽️ 美食</button>
                            <button onClick={()=>handleTabChange('spot')} className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all shadow-lg ${currentTab==='spot' ? 'bg-purple-500 text-white shadow-purple-500/40' : 'bg-slate-800/60 text-gray-400 border border-slate-700'}`}>📸 景點</button>
                            <button onClick={()=>handleTabChange('shop')} className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all shadow-lg ${currentTab==='shop' ? 'bg-emerald-500 text-white shadow-emerald-500/40' : 'bg-slate-800/60 text-gray-400 border border-slate-700'}`}>🛍️ 購物</button>
                        </div>

                        {!hasSearched ? (
                            <div className="animate-fade-in">
                                <div className="mb-8 text-center">
                                    <h1 className="text-4xl font-extrabold text-white mb-3 drop-shadow-md tracking-wide">
                                        {currentTab === 'food' ? '娜娜的美食大冒險' : (currentTab === 'spot' ? '娜娜的仙女打卡圖鑑' : '娜娜的購物戰利品')}
                                    </h1>
                                    <p className="text-sm text-gray-300 font-medium tracking-widest">
                                        {currentTab === 'food' ? '探索隱藏美味，建立專屬圖鑑' : (currentTab === 'spot' ? '紀錄最美風景與完美回憶' : '深度情報比價，買得聰明又漂亮')}
                                    </p>
                                </div>

                                <div className="glass-panel rounded-3xl p-6 shadow-2xl space-y-5">
                                    {fetchError && <div className="bg-red-500/20 border border-red-500/40 rounded-xl p-3 text-xs text-red-300 break-words">⚠️ {fetchError}</div>}

                                    {currentTab !== 'shop' && (
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="flex items-center gap-1.5 text-xs text-gray-400 font-bold mb-2"><MapPin size={14} className="text-red-400" /> 縣市</label>
                                                <select className={`w-full bg-slate-800/60 border border-slate-600 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-${theme}-500 appearance-none disabled:opacity-50`} value={selectedCity} onChange={(e) => {setSelectedCity(e.target.value); setSelectedDistrict('');}} disabled={isHiddenGem || isLoading}>
                                                    <option value="">全部</option>
                                                    {availableCities.map(city => <option key={city} value={city}>{city}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="flex items-center gap-1.5 text-xs text-gray-400 font-bold mb-2"><MapPin size={14} className="text-blue-400" /> 行政區</label>
                                                <select className={`w-full bg-slate-800/60 border border-slate-600 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-${theme}-500 appearance-none disabled:opacity-50`} value={selectedDistrict} onChange={(e) => setSelectedDistrict(e.target.value)} disabled={!selectedCity || isHiddenGem || isLoading}>
                                                    <option value="">全區</option>
                                                    {availableDistricts.map(dist => <option key={dist} value={dist}>{dist}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                    )}

                                    <div>
                                        <label className="flex items-center gap-1.5 text-xs text-gray-400 font-bold mb-2">
                                            <span className={`text-${theme}-400`}>{currentTab === 'food' ? '🤤 想吃什麼？' : (currentTab === 'spot' ? '⛰️ 想去哪裡？' : '📦 找什麼分類？')}</span>
                                        </label>
                                        <select className={`w-full bg-slate-800/60 border border-slate-600 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-${theme}-500 appearance-none disabled:opacity-50`} value={selectedFoodType} onChange={(e) => setSelectedFoodType(e.target.value)} disabled={isHiddenGem || isLoading}>
                                            <option value="">全部</option>
                                            {categoriesData[currentTab].map(c => <option key={c.name} value={c.name}>{c.name} {c.emoji}</option>)}
                                        </select>
                                    </div>

                                    {currentTab !== 'shop' && (
                                        <div className="grid grid-cols-2 gap-3 pt-2">
                                            <button onClick={() => setIsHiddenGem(!isHiddenGem)} disabled={isLoading} className={`flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-bold border transition-colors ${isHiddenGem ? `bg-${theme}-500/20 border-${theme}-500 text-${theme}-400` : 'bg-slate-800/60 border-slate-600 text-gray-300'} disabled:opacity-55`}>🤫 隱藏版</button>
                                            <button onClick={() => setIsOpenNow(!isOpenNow)} className={`flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-bold border transition-colors ${isOpenNow ? 'bg-green-500/20 border-green-500 text-green-400' : 'bg-slate-800/60 border-slate-600 text-gray-300'}`} disabled={isHiddenGem || isLoading}><Clock size={16} /> 營業中</button>
                                        </div>
                                    )}
                                </div>

                                <div className="mt-8">
                                    <button onClick={() => { setHasSearched(true); window.scrollTo(0,0); }} disabled={isLoading} className={`w-full bg-gradient-to-r ${currentTab==='food'?'from-orange-400 to-orange-600 shadow-orange-500/30 hover:shadow-orange-500/50':(currentTab==='spot'?'from-purple-400 to-purple-600 shadow-purple-500/30 hover:shadow-purple-500/50':'from-emerald-400 to-emerald-600 shadow-emerald-500/30 hover:shadow-emerald-500/50')} text-white font-extrabold text-xl py-4 rounded-2xl shadow-lg transition-all disabled:opacity-75 flex justify-center items-center gap-2 tracking-widest`}>
                                        {isLoading ? '載入中...' : '出 發'}
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="animate-fade-in pb-10">
                                <div className="flex justify-center mb-8">
                                    <button onClick={() => setHasSearched(false)} className="glass-panel px-5 py-2 rounded-full text-sm font-bold text-gray-300 hover:text-white flex items-center gap-2 transition-colors"><RefreshCcw size={16} /> 重新篩選</button>
                                </div>

                                <div className="space-y-8">
                                    {filteredItems.length === 0 ? (
                                        <div className="text-center py-12 glass-panel rounded-2xl"><p className="text-gray-400">目前沒有符合條件的項目喔！</p></div>
                                    ) : (
                                        filteredItems.map((item) => (
                                            /* 修改：傳遞 onUpdate 與 onDelete 屬性 */
                                            <UniversalCard key={item.id} item={item} type={currentTab} onUpdate={handleUpdateItem} onDelete={handleDeleteItem} />
                                        ))
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
