<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>娜娜的美食大冒險</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { 
            background-color: #0f172a; 
            font-family: system-ui, -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-white antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // SVG 圖示
        const MapPin = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 0-16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>;
        const Star = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>;
        const Clock = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const DollarSign = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="22"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>;
        const RefreshCcw = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const MessageSquare = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>;
        const Lightbulb = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.3 1.5 1.5 2.5"></path><path d="M9 18h6"></path><path d="M10 22h4"></path></svg>;
        const Edit3 = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>;
        const Save = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;

        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyKXiPyB0px2WYHW2l2CxeCID-yj2ixog9FezvrPYuzfgX9MSAtRcP-hqj3yQTTBbUi/exec';

        const PRICE_LEVELS = [
            { value: 1, label: '平價小吃 ($)' },
            { value: 2, label: '中等價位 ($$)' },
            { value: 3, label: '中高價位 ($$$)' },
            { value: 4, label: '高級饗宴 ($$$$)' }
        ];

        // 🌟 1. 營業時間狀態判斷 (燈號用)
        const checkIsOpenNow = (hoursJson) => {
            if (!hoursJson) return null; 
            try {
                const hours = JSON.parse(hoursJson);
                if (!hours || !hours.periods) return null;
                const twTime = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Taipei"}));
                const currentDay = twTime.getDay(); 
                const currentTimeVal = twTime.getHours() * 100 + twTime.getMinutes();
                for (const period of hours.periods) {
                    if (period.open && !period.close) return true; 
                    const openDay = period.open.day, openTime = period.open.hour * 100 + period.open.minute;
                    const closeDay = period.close.day, closeTime = period.close.hour * 100 + period.close.minute;
                    if (openDay === closeDay) {
                        if (currentDay === openDay && currentTimeVal >= openTime && currentTimeVal < closeTime) return true;
                    } else {
                        if (currentDay === openDay && currentTimeVal >= openTime) return true;
                        if (currentDay === closeDay && currentTimeVal < closeTime) return true;
                    }
                }
                return false; 
            } catch (e) { return null; }
        };

        // 🌟 2. 擷取「今日營業時間」文字 (文字顯示用)
        const getTodayHoursText = (hoursJson) => {
            if (!hoursJson) return '未提供營業時間';
            try {
                const hours = JSON.parse(hoursJson);
                if (hours.weekdayDescriptions && hours.weekdayDescriptions.length > 0) {
                    const twTime = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Taipei"}));
                    let dayIndex = twTime.getDay() - 1; // Google 星期一是 0
                    if (dayIndex === -1) dayIndex = 6;  // 星期天是 6
                    
                    const desc = hours.weekdayDescriptions[dayIndex];
                    // 切割掉「星期幾:」的前綴，只保留時間
                    const splitIndex = desc.indexOf(':') !== -1 ? desc.indexOf(':') : desc.indexOf('：');
                    return splitIndex !== -1 ? desc.substring(splitIndex + 1).trim() : desc;
                }
            } catch(e) {}
            return '依店家公告為主';
        };

        // --- 餐廳卡片組件 ---
        const RestaurantCard = ({ restaurant, renderPrice }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [noteContent, setNoteContent] = useState(restaurant.personalNote || '');
            const [isSaving, setIsSaving] = useState(false);

            const handleSaveNote = async () => {
                setIsSaving(true);
                try {
                    await fetch(GAS_API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'updateNote', rowId: restaurant.id, note: noteContent })
                    });
                    restaurant.personalNote = noteContent;
                    setIsEditing(false);
                } catch (error) {
                    alert('儲存失敗，請確認網路連線或稍後再試！');
                } finally {
                    setIsSaving(false);
                }
            };

            return (
                <div className="glass-panel rounded-2xl overflow-hidden relative border-l-4 border-l-orange-500 animate-fade-in group shadow-2xl mb-8">
                    
                    {/* 📸 圖片強制顯示區塊 */}
                    {restaurant.photoUrl && (
                        <div className="w-full h-40 overflow-hidden relative bg-slate-800">
                            <div className="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent z-10"></div>
                            <img 
                                src={restaurant.photoUrl} 
                                className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" 
                                alt="餐廳照片"
                                onError={(e) => { e.target.style.display = 'none'; }} // 如果圖片失效自動隱藏，防止破圖
                            />
                        </div>
                    )}
                    
                    <div className={`p-5 ${restaurant.photoUrl ? '-mt-6 relative z-20' : ''}`}>
                        <div className="flex justify-between items-start mb-6">
                            <h3 className="text-2xl font-extrabold text-white pr-4 drop-shadow-md">{restaurant.name}</h3>
                            <div className="flex flex-col items-end gap-1 shrink-0">
                                {restaurant.isHidden && (
                                    <span className="bg-red-500/20 text-red-400 border border-red-500/30 text-[10px] font-bold px-2 py-1 rounded-full">隱藏版</span>
                                )}
                                {restaurant.isOpenNow === true && (
                                    <span className="bg-green-500/20 text-green-400 border border-green-500/30 text-[10px] font-bold px-2 py-1 rounded-full flex items-center gap-1">
                                        <span className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> 營業中
                                    </span>
                                )}
                                {restaurant.isOpenNow === false && (
                                    <span className="bg-gray-500/20 text-gray-400 border border-gray-500/30 text-[10px] font-bold px-2 py-1 rounded-full">休息中</span>
                                )}
                            </div>
                        </div>

                        {/* 🌟 資訊排版：完全對齊你的截圖設計 */}
                        <div className="space-y-4 mb-6">
                            {!restaurant.isHidden && (
                                <React.Fragment>
                                    <div className="flex items-center gap-3 text-sm text-gray-300">
                                        <Star size={18} className="text-yellow-400 fill-yellow-400" />
                                        <span><strong className="text-white tracking-wide">Google 評分：</strong>{restaurant.rating > 0 ? `${restaurant.rating} 顆星` : '尚未評分'}</span>
                                    </div>
                                    <div className="flex items-center gap-3 text-sm text-gray-300">
                                        <Clock size={18} className="text-gray-400" />
                                        <span><strong className="text-white tracking-wide">營業時間：</strong>今日 {restaurant.todayHoursText}</span>
                                    </div>
                                    <div className="flex items-center gap-3 text-sm text-gray-300">
                                        <DollarSign size={18} className="text-orange-300" />
                                        <span><strong className="text-white tracking-wide">價位/類型：</strong>{renderPrice(restaurant.priceLevel)} ({restaurant.city}{restaurant.district} · {restaurant.foodType})</span>
                                    </div>
                                </React.Fragment>
                            )}
                        </div>

                        {/* AI 三段式深度點評區塊 */}
                        <div className="space-y-5 border-t border-slate-700/50 pt-5">
                            {restaurant.aiData && typeof restaurant.aiData === 'object' ? (
                                <React.Fragment>
                                    {restaurant.aiData.signature && (
                                        <div className="flex items-start gap-3">
                                            <div className="bg-orange-500/20 p-1.5 rounded-full mt-0.5"><Star size={14} className="text-orange-400" /></div>
                                            <div className="leading-relaxed">
                                                <span className="text-sm font-bold text-white mr-2">必點招牌：</span>
                                                <span className="text-sm text-gray-400">{restaurant.aiData.signature}</span>
                                            </div>
                                        </div>
                                    )}
                                    {restaurant.aiData.review && (
                                        <div className="flex items-start gap-3">
                                            <div className="bg-blue-500/20 p-1.5 rounded-full mt-0.5"><MessageSquare size={14} className="text-blue-400" /></div>
                                            <div className="leading-relaxed">
                                                <span className="text-sm font-bold text-white mr-2">評論摘要：</span>
                                                <span className="text-sm text-gray-400">{restaurant.aiData.review}</span>
                                            </div>
                                        </div>
                                    )}
                                    {restaurant.aiData.reason && (
                                        <div className="flex items-start gap-3">
                                            <div className="bg-yellow-500/20 p-1.5 rounded-full mt-0.5"><Lightbulb size={14} className="text-yellow-400" /></div>
                                            <div className="leading-relaxed">
                                                <span className="text-sm font-bold text-white mr-2">推薦原因：</span>
                                                <span className="text-sm text-gray-400">{restaurant.aiData.reason}</span>
                                            </div>
                                        </div>
                                    )}
                                </React.Fragment>
                            ) : (
                                restaurant.aiData && <p className="text-sm text-gray-400 italic">" {restaurant.aiData} "</p>
                            )}
                        </div>
                        
                        {/* 網頁前端直接儲存筆記區塊 */}
                        <div className="mt-6 pt-5 border-t border-slate-700/50">
                            {isEditing ? (
                                <div className="bg-slate-800/80 p-3 rounded-xl border border-orange-500/50">
                                    <textarea 
                                        className="w-full bg-transparent text-sm text-gray-200 outline-none resize-none placeholder-gray-500 min-h-[60px]"
                                        placeholder="寫下你的評語或紀錄..."
                                        value={noteContent}
                                        onChange={(e) => setNoteContent(e.target.value)}
                                        autoFocus
                                    />
                                    <div className="flex justify-end gap-2 mt-2">
                                        <button onClick={() => setIsEditing(false)} className="text-xs text-gray-400 px-3 py-1 hover:text-white" disabled={isSaving}>取消</button>
                                        <button onClick={handleSaveNote} className="flex items-center gap-1 text-xs bg-orange-500 text-white px-3 py-1.5 rounded-lg hover:bg-orange-600 disabled:opacity-50" disabled={isSaving}>
                                            {isSaving ? '儲存中...' : <React.Fragment><Save size={12} /> 儲存筆記</React.Fragment>}
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div 
                                    className="bg-slate-800/40 hover:bg-slate-800/80 p-3 rounded-xl border border-dashed border-slate-600/50 cursor-text transition-colors group flex items-start justify-between gap-2"
                                    onClick={() => setIsEditing(true)}
                                >
                                    <div className="flex items-start gap-2 text-sm text-gray-300">
                                        <Edit3 size={14} className="text-gray-500 mt-0.5 shrink-0" />
                                        <span className={restaurant.personalNote ? '' : 'text-gray-500 italic'}>
                                            {restaurant.personalNote || '點此新增個人筆記...'}
                                        </span>
                                    </div>
                                    <span className="text-[10px] text-gray-500 opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pt-0.5">編輯</span>
                                </div>
                            )}
                        </div>
                    </div>

                    {!restaurant.isHidden && restaurant.mapUrl && (
                        <div className="bg-slate-800/80 px-5 py-4 border-t border-slate-700/50">
                            <a href={restaurant.mapUrl} target="_blank" rel="noopener noreferrer" className="w-full flex justify-center items-center gap-2 text-sm font-bold text-orange-400 hover:text-orange-300 transition-colors tracking-widest">
                                在 Google 地圖開啟
                            </a>
                        </div>
                    )}
                </div>
            );
        };

        function App() {
            const [restaurants, setRestaurants] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [hasSearched, setHasSearched] = useState(false);
            const [fetchError, setFetchError] = useState(null);

            const [selectedCity, setSelectedCity] = useState('');
            const [selectedDistrict, setSelectedDistrict] = useState('');
            const [selectedFoodType, setSelectedFoodType] = useState('');
            const [selectedPrice, setSelectedPrice] = useState('');
            const [isHiddenGem, setIsHiddenGem] = useState(false);
            const [isOpenNow, setIsOpenNow] = useState(false);

            useEffect(() => {
                const fetchRestaurants = async () => {
                    try {
                        const response = await fetch(GAS_API_URL);
                        if (!response.ok) throw new Error("網路連線異常");
                        const data = await response.json();
                        
                        if (data && Array.isArray(data)) {
                            const formattedData = data.map(item => {
                                let aiSummaryData = null;
                                const rawAiText = item['AI總結'] || '';
                                
                                if (rawAiText.startsWith('{') && rawAiText.endsWith('}')) {
                                    try { aiSummaryData = JSON.parse(rawAiText); } catch(e) {}
                                }

                                const isHidden = !item['地圖連結'] || item['地圖連結'] === "";
                                const rawPrice = parseInt(item['價位']);
                                const safePriceLevel = isNaN(rawPrice) ? 2 : rawPrice;
                                
                                // 🌟 從 GAS 取出資料
                                const rawHoursJson = item['營業時間'] || item['營業狀態'] || '';
                                const photoUrl = item['照片網址'] || item['照片'] || item['照片連結'] || '';

                                return {
                                    id: item.id, 
                                    name: item['店名'] || '未命名餐廳',
                                    city: item['縣市'] || '',
                                    district: item['區域'] || '',
                                    foodType: item['類型'] || '美食',
                                    priceLevel: safePriceLevel,
                                    rating: parseFloat(item['Google評分']) || 0,
                                    address: item['完整地址'] || item['地址'] || '',
                                    mapUrl: item['地圖連結'] || '',
                                    photoUrl: photoUrl, // 📸 圖片網址防呆讀取
                                    isHidden: isHidden,
                                    aiData: aiSummaryData || rawAiText, 
                                    personalNote: item['個人註解'] || '', 
                                    isOpenNow: checkIsOpenNow(rawHoursJson),
                                    todayHoursText: getTodayHoursText(rawHoursJson) // 🕒 取出今日營業時間文字
                                };
                            }).filter(item => item.name !== '未命名餐廳' && item.name !== '');

                            setRestaurants(formattedData.reverse());
                        } else {
                            throw new Error(data.error || "API 資料格式異常");
                        }
                    } catch (err) {
                        console.error("讀取失敗:", err);
                        setFetchError(err.message || "無法取得餐廳列表，請確認 Google Sheet 是否已正確發佈。");
                    } finally {
                        setIsLoading(false);
                    }
                };
                fetchRestaurants();
            }, []);

            const availableCities = useMemo(() => {
                const cities = restaurants.map(r => r.city).filter(c => c && c !== '隱藏版' && c !== '未知');
                return [...new Set(cities)].sort();
            }, [restaurants]);

            const availableDistricts = useMemo(() => {
                if (!selectedCity) return [];
                const districts = restaurants.filter(r => r.city === selectedCity).map(r => r.district).filter(d => d && d !== '未知區域');
                return [...new Set(districts)].sort();
            }, [restaurants, selectedCity]);

            const availableFoodTypes = useMemo(() => {
                const types = restaurants.map(r => r.foodType).filter(t => t && t !== '美食');
                return [...new Set(types)].sort();
            }, [restaurants]);

            const filteredRestaurants = useMemo(() => {
                return restaurants.filter(restaurant => {
                    if (isHiddenGem) {
                        if (!restaurant.isHidden) return false;
                    } else {
                        if (restaurant.isHidden) return false;
                        if (selectedCity && restaurant.city !== selectedCity) return false;
                        if (selectedDistrict && restaurant.district !== selectedDistrict) return false;
                        if (selectedFoodType && restaurant.foodType !== selectedFoodType) return false;
                        if (selectedPrice && restaurant.priceLevel !== parseInt(selectedPrice)) return false;
                        if (isOpenNow && restaurant.isOpenNow !== true) return false;
                    }
                    return true;
                });
            }, [restaurants, selectedCity, selectedDistrict, selectedFoodType, selectedPrice, isHiddenGem, isOpenNow]);

            const renderPrice = (level) => {
                const num = parseInt(level);
                if (isNaN(num) || num < 1) return 'NT$ 不明';
                if (num === 1) return '百元平價小吃 ($)';
                if (num === 2) return '人均消費約 NT$300-800 ($$)';
                if (num === 3) return '人均消費約 NT$800-1500 ($$$)';
                if (num >= 4) return '人均消費 NT$1500+ ($$$$)';
                return '$';
            };

            return (
                <div className="relative min-h-screen bg-slate-900 selection:bg-orange-500 selection:text-white pb-12">
                    <div className="fixed inset-0 z-0 pointer-events-none">
                        <img src="https://images.unsplash.com/photo-1514933651103-005eec06c04b?auto=format&fit=crop&q=80&w=1920" className="w-full h-full object-cover opacity-20" alt="background" />
                        <div className="absolute inset-0 bg-gradient-to-b from-slate-900/60 via-slate-900/80 to-slate-900"></div>
                    </div>

                    <div className="relative z-10 max-w-md mx-auto px-5 pt-12">
                        {!hasSearched ? (
                            <div className="animate-fade-in">
                                <div className="mb-8 text-center">
                                    <h1 className="text-4xl font-extrabold text-white mb-3 drop-shadow-md tracking-wide">娜娜的美食大冒險</h1>
                                    <p className="text-sm text-gray-300 font-medium tracking-widest">探索隱藏美味，建立你的專屬圖鑑</p>
                                </div>

                                <div className="glass-panel rounded-3xl p-6 shadow-2xl space-y-5">
                                    {fetchError && (
                                        <div className="bg-red-500/20 border border-red-500/40 rounded-xl p-3 text-xs text-red-300 break-words">
                                            ⚠️ {fetchError}
                                        </div>
                                    )}

                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="flex items-center gap-1.5 text-xs text-gray-400 font-bold mb-2"><MapPin size={14} className="text-red-400" /> 縣市</label>
                                            <select className="w-full bg-slate-800/60 border border-slate-600 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-orange-500 appearance-none disabled:opacity-50" value={selectedCity} onChange={(e) => {setSelectedCity(e.target.value); setSelectedDistrict('');}} disabled={isHiddenGem || isLoading}>
                                                <option value="">全部</option>
                                                {availableCities.map(city => <option key={city} value={city}>{city}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="flex items-center gap-1.5 text-xs text-gray-400 font-bold mb-2"><MapPin size={14} className="text-blue-400" /> 行政區</label>
                                            <select className="w-full bg-slate-800/60 border border-slate-600 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-orange-500 appearance-none disabled:opacity-50" value={selectedDistrict} onChange={(e) => setSelectedDistrict(e.target.value)} disabled={!selectedCity || isHiddenGem || isLoading}>
                                                <option value="">全區</option>
                                                {availableDistricts.map(dist => <option key={dist} value={dist}>{dist}</option>)}
                                            </select>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="flex items-center gap-1.5 text-xs text-gray-400 font-bold mb-2"><span className="text-yellow-400">🤤</span> 想吃什麼？</label>
                                        <select className="w-full bg-slate-800/60 border border-slate-600 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-orange-500 appearance-none disabled:opacity-50" value={selectedFoodType} onChange={(e) => setSelectedFoodType(e.target.value)} disabled={isHiddenGem || isLoading}>
                                            <option value="">全部</option>
                                            {availableFoodTypes.map(type => <option key={type} value={type}>{type}</option>)}
                                        </select>
                                    </div>

                                    <div>
                                        <label className="flex items-center gap-1.5 text-xs text-gray-400 font-bold mb-2"><DollarSign size={14} className="text-green-400" /> 預算範圍</label>
                                        <select className="w-full bg-slate-800/60 border border-slate-600 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-orange-500 appearance-none disabled:opacity-50" value={selectedPrice} onChange={(e) => setSelectedPrice(e.target.value)} disabled={isHiddenGem || isLoading}>
                                            <option value="">全部</option>
                                            {PRICE_LEVELS.map(level => <option key={level.value} value={level.value}>{level.label}</option>)}
                                        </select>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3 pt-2">
                                        <button onClick={() => setIsHiddenGem(!isHiddenGem)} disabled={isLoading} className={`flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-bold border transition-colors ${isHiddenGem ? 'bg-orange-500/20 border-orange-500 text-orange-400' : 'bg-slate-800/60 border-slate-600 text-gray-300'} disabled:opacity-55`}>🤫 隱藏版</button>
                                        <button onClick={() => setIsOpenNow(!isOpenNow)} className={`flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-bold border transition-colors ${isOpenNow ? 'bg-green-500/20 border-green-500 text-green-400' : 'bg-slate-800/60 border-slate-600 text-gray-300'}`} disabled={isHiddenGem || isLoading}><Clock size={16} /> 營業中</button>
                                    </div>
                                </div>

                                <div className="mt-8">
                                    <button onClick={() => { setHasSearched(true); window.scrollTo(0,0); }} disabled={isLoading} className="w-full bg-gradient-to-r from-orange-400 to-orange-600 text-white font-extrabold text-xl py-4 rounded-2xl shadow-lg shadow-orange-500/30 hover:shadow-orange-500/50 transition-all disabled:opacity-75 flex justify-center items-center gap-2 tracking-widest">
                                        {isLoading ? (
                                            <span className="flex items-center gap-2">
                                                <svg className="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                                                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                </svg>
                                                載入美味選單中...
                                            </span>
                                        ) : '出 發'}
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="animate-fade-in pb-10">
                                <div className="flex justify-center mb-8">
                                    <button onClick={() => setHasSearched(false)} className="glass-panel px-5 py-2 rounded-full text-sm font-bold text-gray-300 hover:text-white flex items-center gap-2 transition-colors"><RefreshCcw size={16} /> 重新選擇</button>
                                </div>

                                <div className="space-y-8">
                                    {filteredRestaurants.length === 0 ? (
                                        <div className="text-center py-12 glass-panel rounded-2xl"><p className="text-gray-400">目前沒有符合條件的餐廳喔！</p></div>
                                    ) : (
                                        filteredRestaurants.map((restaurant) => (
                                            <RestaurantCard key={restaurant.id} restaurant={restaurant} renderPrice={renderPrice} />
                                        ))
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
