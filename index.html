<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EatExplorer AI - 台灣美食地圖</title>
    <!-- 引入 Tailwind CSS 進行排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 核心 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- 引入 Babel 來解析 JSX 語法 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { 
            background-color: #0f172a; /* 深色背景 */
            font-family: system-ui, -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        /* 自訂卷軸 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        
        /* 毛玻璃效果與動畫 */
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-white antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- SVG 圖示組件 ---
        const MapPin = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 0-16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>;
        const Star = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>;
        const Clock = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const DollarSign = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="22"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>;
        const RefreshCcw = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const Sparkles = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
        const Compass = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>;
        const MapIcon = ({size=20, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21 3 6"></polygon><line x1="9" y1="3" x2="9" y2="18"></line><line x1="15" y1="6" x2="15" y2="21"></line></svg>;

        // 你的 GAS API 網址
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyKXiPyB0px2WYHW2l2CxeCID-yj2ixog9FezvrPYuzfgX9MSAtRcP-hqj3yQTTBbUi/exec';

        const TAIWAN_REGIONS = {
            '台北市': ['大安區', '信義區', '中山區', '中正區', '松山區', '萬華區', '大同區', '士林區', '北投區', '內湖區', '南港區', '文山區'],
            '新北市': ['板橋區', '中和區', '新莊區', '淡水區', '三重區', '蘆洲區', '新店區', '永和區', '汐止區'],
            '台中市': ['西屯區', '南屯區', '北區', '中區', '西區', '東區', '南區', '北屯區'],
            '台南市': ['中西區', '東區', '安平區', '北區', '南區', '永康區'],
            '高雄市': ['左營區', '三民區', '苓雅區', '新興區', '鼓山區', '前鎮區', '鳳山區', '前金區']
        };

        const PRICE_LEVELS = [
            { value: 1, label: '平價小吃 ($)' },
            { value: 2, label: '中等價位 ($$)' },
            { value: 3, label: '中高價位 ($$$)' },
            { value: 4, label: '高級饗宴 ($$$$)' }
        ];

        function App() {
            // --- 資料狀態 ---
            const [restaurants, setRestaurants] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [hasSearched, setHasSearched] = useState(false); // 控制顯示首頁或結果頁

            // --- 搜尋條件狀態 ---
            const [selectedCity, setSelectedCity] = useState('');
            const [selectedDistrict, setSelectedDistrict] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedPrice, setSelectedPrice] = useState('');
            const [isHiddenGem, setIsHiddenGem] = useState(false);
            const [isOpenNow, setIsOpenNow] = useState(false);

            // 1. 初始化讀取資料
            useEffect(() => {
                const fetchRestaurants = async () => {
                    try {
                        const response = await fetch(GAS_API_URL);
                        const data = await response.json();
                        
                        const formattedData = data.map(item => ({
                            id: item.id || Math.random(),
                            name: item['店名'] || '未命名餐廳',
                            city: item['縣市'] || '',
                            district: item['區域'] || '',
                            foodType: item['類型'] || '美食',
                            priceLevel: parseInt(item['價位']) || 2,
                            rating: parseFloat(item['Google評分']) || 0,
                            address: item['完整地址'] || item['地址'] || '',
                            aiSummary: item['AI總結'] || '尚無 AI 點評資料。',
                            mapUrl: item['地圖連結'] || '',
                            image: item['照片網址'] || `https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&q=80&w=800&random=${item.id}`
                        })).filter(item => item.name !== '未命名餐廳' && item.name !== '');

                        setRestaurants(formattedData);
                    } catch (err) {
                        console.error("讀取失敗:", err);
                    } finally {
                        setIsLoading(false);
                    }
                };
                fetchRestaurants();
            }, []);

            // 2. 篩選邏輯
            const filteredRestaurants = useMemo(() => {
                return restaurants.filter(restaurant => {
                    if (selectedCity && restaurant.city !== selectedCity) return false;
                    if (selectedDistrict && restaurant.district !== selectedDistrict) return false;
                    if (searchQuery) {
                        const query = searchQuery.toLowerCase();
                        if (!restaurant.foodType.toLowerCase().includes(query) && !restaurant.name.toLowerCase().includes(query)) return false;
                    }
                    if (selectedPrice && restaurant.priceLevel !== parseInt(selectedPrice)) return false;
                    
                    // 🤫 隱藏版邏輯：如果沒有評分(0) 或者沒有 Google 地圖連結，視為隱藏版截圖
                    if (isHiddenGem) {
                        const isHidden = restaurant.rating === 0 || !restaurant.mapUrl;
                        if (!isHidden) return false;
                    }
                    
                    // 🕒 營業中邏輯：目前全部視為營業中 (可供未來擴充真實時間判斷)
                    if (isOpenNow) {
                        // 這裡未來可以加入時間判斷，目前只要勾選就通通顯示
                    }
                    
                    return true;
                });
            }, [restaurants, selectedCity, selectedDistrict, searchQuery, selectedPrice, isHiddenGem, isOpenNow]);

            const renderPrice = (level) => Array(Math.min(Math.max(level, 1), 4)).fill('$').join('');

            const handleSearch = () => {
                setHasSearched(true);
                window.scrollTo(0, 0);
            };

            const resetSearch = () => {
                setHasSearched(false);
            };

            // 產生隨機的 AI 歡迎導言
            const generateAIIntro = () => {
                let intro = "哈囉！很高興能擔任您的台灣在地美食導遊！";
                if (selectedCity) intro += `要在${selectedCity}${selectedDistrict}尋找`;
                else intro += "要在台灣尋找";
                
                if (isHiddenGem) intro += "「Google找不到的隱藏版截圖美食」，這正是我的拿手好戲！";
                else if (searchQuery) intro += `完美的「${searchQuery}」，這正是我的拿手好戲！`;
                else intro += "令人驚豔的高品質美味，這正是我的拿手好戲！";
                
                intro += " 經過一番精挑細選，我為您找出了以下幾間符合條件的精選餐廳，希望能為您增添光彩。";
                return intro;
            };

            return (
                <div className="relative min-h-screen bg-slate-900 selection:bg-orange-500 selection:text-white pb-12">
                    {/* 背景圖片疊加 */}
                    <div className="fixed inset-0 z-0 pointer-events-none">
                        <img src="https://images.unsplash.com/photo-1514933651103-005eec06c04b?auto=format&fit=crop&q=80&w=1920" className="w-full h-full object-cover opacity-20" alt="background" />
                        <div className="absolute inset-0 bg-gradient-to-b from-slate-900/60 via-slate-900/80 to-slate-900"></div>
                    </div>

                    <div className="relative z-10 max-w-md mx-auto px-5 pt-12">
                        
                        {/* =========================================
                            狀態 A：首頁 (未搜尋) - 仿 App 玻璃質感介面
                            ========================================= */}
                        {!hasSearched ? (
                            <div className="animate-fade-in">
                                {/* 頭部標題 */}
                                <div className="mb-8 text-center">
                                    <h2 className="text-gray-400 font-medium tracking-widest text-sm mb-2">EatExplorer AI</h2>
                                    <h1 className="text-4xl font-extrabold text-white mb-3 drop-shadow-md">EatExplorer</h1>
                                    <p className="text-sm text-gray-300 font-medium">探索巷弄隱藏美味，享受極致台灣饗宴</p>
                                    
                                    <div className="mt-4 inline-flex items-center gap-1.5 bg-orange-500/20 text-orange-400 px-3 py-1 rounded-full text-xs font-bold border border-orange-500/30">
                                        <MapPin size={12} />
                                        <span>GPS 定位就緒</span>
                                    </div>
                                </div>

                                {/* 搜尋表單卡片 */}
                                <div className="glass-panel rounded-3xl p-6 shadow-2xl space-y-5">
                                    
                                    {/* 縣市與行政區 */}
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="flex items-center gap-1.5 text-xs text-gray-400 font-bold mb-2">
                                                <MapPin size={14} className="text-red-400" /> 縣市
                                            </label>
                                            <select 
                                                className="w-full bg-slate-800/60 border border-slate-600 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 appearance-none"
                                                value={selectedCity}
                                                onChange={(e) => {setSelectedCity(e.target.value); setSelectedDistrict('');}}
                                            >
                                                <option value="">全部 (不限縣市)</option>
                                                {Object.keys(TAIWAN_REGIONS).map(city => <option key={city} value={city}>{city}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="flex items-center gap-1.5 text-xs text-gray-400 font-bold mb-2">
                                                <MapIcon size={14} className="text-blue-400" /> 行政區
                                            </label>
                                            <select 
                                                className="w-full bg-slate-800/60 border border-slate-600 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 appearance-none disabled:opacity-50"
                                                value={selectedDistrict}
                                                onChange={(e) => setSelectedDistrict(e.target.value)}
                                                disabled={!selectedCity}
                                            >
                                                <option value="">全區</option>
                                                {selectedCity && TAIWAN_REGIONS[selectedCity]?.map(dist => <option key={dist} value={dist}>{dist}</option>)}
                                            </select>
                                        </div>
                                    </div>

                                    {/* 想吃什麼 */}
                                    <div>
                                        <label className="flex items-center gap-1.5 text-xs text-gray-400 font-bold mb-2">
                                            <span className="text-yellow-400">🤤</span> 想吃什麼？
                                        </label>
                                        <input 
                                            type="text" 
                                            placeholder="全部 (什麼都想吃)"
                                            className="w-full bg-slate-800/60 border border-slate-600 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 placeholder-gray-500"
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                        />
                                    </div>

                                    {/* 預算範圍 */}
                                    <div>
                                        <label className="flex items-center gap-1.5 text-xs text-gray-400 font-bold mb-2">
                                            <DollarSign size={14} className="text-green-400" /> 預算範圍
                                        </label>
                                        <select 
                                            className="w-full bg-slate-800/60 border border-slate-600 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 appearance-none"
                                            value={selectedPrice}
                                            onChange={(e) => setSelectedPrice(e.target.value)}
                                        >
                                            <option value="">全部</option>
                                            {PRICE_LEVELS.map(level => <option key={level.value} value={level.value}>{level.label}</option>)}
                                        </select>
                                    </div>

                                    {/* 狀態按鈕 (隱藏版 / 營業中) */}
                                    <div className="grid grid-cols-2 gap-3 pt-2">
                                        <button 
                                            onClick={() => setIsHiddenGem(!isHiddenGem)}
                                            className={`flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-bold border transition-colors ${isHiddenGem ? 'bg-orange-500/20 border-orange-500 text-orange-400' : 'bg-slate-800/60 border-slate-600 text-gray-300'}`}
                                        >
                                            🤫 隱藏版
                                        </button>
                                        <button 
                                            onClick={() => setIsOpenNow(!isOpenNow)}
                                            className={`flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-bold border transition-colors ${isOpenNow ? 'bg-orange-500/20 border-orange-500 text-orange-400' : 'bg-slate-800/60 border-slate-600 text-gray-300'}`}
                                        >
                                            <Clock size={16} /> 營業中
                                        </button>
                                    </div>
                                </div>

                                {/* 搜尋大按鈕 */}
                                <div className="mt-8">
                                    <button 
                                        onClick={handleSearch}
                                        disabled={isLoading}
                                        className="w-full bg-gradient-to-r from-orange-400 to-orange-600 text-white font-extrabold text-lg py-4 rounded-2xl shadow-lg shadow-orange-500/30 hover:shadow-orange-500/50 transition-all disabled:opacity-70 flex justify-center items-center gap-2"
                                    >
                                        {isLoading ? <span className="animate-pulse">讀取圖鑑中...</span> : '開始探索美食'}
                                    </button>
                                </div>
                            </div>
                        ) : (
                            
                        /* =========================================
                           狀態 B：結果頁 (已搜尋)
                           ========================================= */
                            <div className="animate-fade-in pb-10">
                                {/* 頂部：重新搜尋按鈕 */}
                                <div className="flex justify-center mb-8">
                                    <button 
                                        onClick={resetSearch}
                                        className="glass-panel px-5 py-2 rounded-full text-sm font-bold text-gray-300 hover:text-white flex items-center gap-2 transition-colors"
                                    >
                                        <RefreshCcw size={16} /> 重新搜尋
                                    </button>
                                </div>

                                {/* 標題 */}
                                <h2 className="text-gray-400 font-medium tracking-widest text-xs mb-6 text-center">EatExplorer AI</h2>

                                {/* AI 尋味報告 */}
                                <div className="glass-panel rounded-2xl p-6 mb-8 border border-white/10 shadow-xl">
                                    <h3 className="text-xl font-extrabold text-orange-300 flex items-center gap-2 mb-4">
                                        <Sparkles size={22} className="text-orange-400" /> AI 尋味報告
                                    </h3>
                                    <p className="text-sm leading-relaxed text-gray-300 mb-4">
                                        {generateAIIntro()}
                                    </p>
                                    <p className="text-sm font-bold text-white border-b border-gray-700 pb-2">
                                        以下是為您推薦的 {filteredRestaurants.length} 間餐廳：
                                    </p>
                                </div>

                                {/* 餐廳列表卡片 */}
                                <div className="space-y-6">
                                    {filteredRestaurants.length === 0 ? (
                                        <div className="text-center py-10 glass-panel rounded-2xl">
                                            <Compass size={40} className="mx-auto text-gray-500 mb-3" />
                                            <p className="text-gray-400">找不到符合條件的餐廳<br/>換個條件試試看吧！</p>
                                        </div>
                                    ) : (
                                        filteredRestaurants.map((restaurant, idx) => (
                                            <div key={idx} className="glass-panel rounded-2xl overflow-hidden relative border-l-4 border-l-orange-500">
                                                {/* 上半部：店名與基本資訊 */}
                                                <div className="p-5">
                                                    <h3 className="text-xl font-extrabold text-white mb-4 pr-16">{restaurant.name}</h3>
                                                    
                                                    {/* 隱藏版標籤 */}
                                                    {(restaurant.rating === 0 || !restaurant.mapUrl) && (
                                                        <div className="absolute top-5 right-4 bg-red-500 text-white text-[10px] font-bold px-2 py-1 rounded-sm tracking-wider">
                                                            GOOGLE 無資料
                                                        </div>
                                                    )}

                                                    <div className="space-y-3">
                                                        {/* 評分 */}
                                                        <div className="flex items-start gap-3">
                                                            <div className="bg-orange-500/20 p-1.5 rounded-lg mt-0.5">
                                                                <Star size={16} className="text-orange-400 fill-orange-400" />
                                                            </div>
                                                            <div>
                                                                <p className="text-xs text-gray-400 font-bold mb-0.5">Google 評分</p>
                                                                <p className="text-sm text-gray-200">{restaurant.rating > 0 ? `${restaurant.rating} 顆星` : '在地人私藏 (無評分)'}</p>
                                                            </div>
                                                        </div>

                                                        {/* 營業時間 (示意) */}
                                                        <div className="flex items-start gap-3">
                                                            <div className="bg-slate-700 p-1.5 rounded-lg mt-0.5">
                                                                <Clock size={16} className="text-gray-300" />
                                                            </div>
                                                            <div>
                                                                <p className="text-xs text-gray-400 font-bold mb-0.5">營業時間</p>
                                                                <p className="text-sm text-gray-200">今日營業中 (請以店家為準)</p>
                                                            </div>
                                                        </div>

                                                        {/* 價位與類型 */}
                                                        <div className="flex items-start gap-3">
                                                            <div className="bg-green-900/40 p-1.5 rounded-lg mt-0.5">
                                                                <DollarSign size={16} className="text-green-400" />
                                                            </div>
                                                            <div>
                                                                <p className="text-xs text-gray-400 font-bold mb-0.5">價位與類型</p>
                                                                <p className="text-sm text-gray-200">{renderPrice(restaurant.priceLevel)} · {restaurant.foodType}</p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* 下半部：AI 點評與連結 */}
                                                <div className="bg-slate-800/80 px-5 py-4 border-t border-slate-700/50">
                                                    <p className="text-xs text-gray-400 leading-relaxed italic mb-3">
                                                        " {restaurant.aiSummary} "
                                                    </p>
                                                    <a 
                                                        href={restaurant.mapUrl || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(restaurant.name + ' ' + restaurant.address)}`} 
                                                        target="_blank" 
                                                        rel="noopener noreferrer"
                                                        className="w-full inline-block text-center bg-white/10 hover:bg-white/20 text-white font-bold py-2.5 rounded-xl text-sm transition-colors border border-white/10"
                                                    >
                                                        查看詳細地圖
                                                    </a>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
