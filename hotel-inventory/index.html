<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的私房美食地圖</title>
    <!-- 引入 Tailwind CSS 進行排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 核心 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- 引入 Babel 來解析 JSX 語法 -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
        body { background-color: #f9fafb; font-family: system-ui, -apple-system, sans-serif; }
        /* 隱藏卷軸但保留滾動功能 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 1. SVG 圖示組件 ---
        const Search = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const MapPin = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 0-16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>;
        const Star = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>;
        const Clock = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const DollarSign = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="22"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>;
        const ChevronRight = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>;
        const XIcon = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const Globe = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>;
        const Loader2 = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;

        // 🌟🌟🌟 在這裡填入你的 GAS Web App URL 🌟🌟🌟
        const GAS_API_URL = '請在這裡貼上你的 doGet 網址';

        const TAIWAN_REGIONS = {
            '台北市': ['大安區', '信義區', '中山區', '中正區', '松山區', '萬華區', '大同區'],
            '新北市': ['板橋區', '中和區', '新莊區', '淡水區', '三重區', '蘆洲區'],
            '台中市': ['西屯區', '南屯區', '北區', '中區', '西區', '東區'],
            '台南市': ['中西區', '東區', '安平區', '北區', '南區'],
            '高雄市': ['左營區', '三民區', '苓雅區', '新興區', '鼓山區', '前鎮區']
        };

        const PRICE_LEVELS = [
            { value: 1, label: '$ (平價)' },
            { value: 2, label: '$$ (中等)' },
            { value: 3, label: '$$$ (偏高)' },
            { value: 4, label: '$$$$ (高價)' }
        ];

        function App() {
            const [restaurants, setRestaurants] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState(null);

            const [selectedCity, setSelectedCity] = useState('');
            const [selectedDistrict, setSelectedDistrict] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedPrice, setSelectedPrice] = useState('');
            const [selectedRestaurant, setSelectedRestaurant] = useState(null);

            // 讀取資料
            useEffect(() => {
                const fetchRestaurants = async () => {
                    if (GAS_API_URL.includes('請在這裡貼上')) {
                        setError('請先在程式碼中填入您的 GAS API 網址！');
                        setIsLoading(false);
                        return;
                    }
                    try {
                        const response = await fetch(GAS_API_URL);
                        const data = await response.json();
                        
                        const formattedData = data.map(item => ({
                            id: item.id || Math.random(),
                            name: item['店名'] || '未命名餐廳',
                            city: item['縣市'] || '',
                            district: item['區域'] || '',
                            foodType: item['類型'] || '美食',
                            priceLevel: parseInt(item['價位']) || 2,
                            rating: parseFloat(item['評分']) || 0,
                            address: item['地址'] || `${item['縣市'] || ''}${item['區域'] || ''}`,
                            dateAdded: item['加入時間'] || '',
                            image: `https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&q=80&w=800&random=${item.id}`
                        })).filter(item => item.name !== '未命名餐廳' && item.name !== '');

                        setRestaurants(formattedData);
                    } catch (err) {
                        console.error("讀取失敗:", err);
                        setError('無法讀取資料，請確認網址正確。');
                    } finally {
                        setIsLoading(false);
                    }
                };
                fetchRestaurants();
            }, []);

            const filteredRestaurants = useMemo(() => {
                return restaurants.filter(restaurant => {
                    if (selectedCity && restaurant.city !== selectedCity) return false;
                    if (selectedDistrict && restaurant.district !== selectedDistrict) return false;
                    if (searchQuery) {
                        const query = searchQuery.toLowerCase();
                        if (!restaurant.name.toLowerCase().includes(query) && !restaurant.foodType.toLowerCase().includes(query)) return false;
                    }
                    if (selectedPrice && restaurant.priceLevel !== parseInt(selectedPrice)) return false;
                    return true;
                });
            }, [restaurants, selectedCity, selectedDistrict, searchQuery, selectedPrice]);

            const renderPrice = (level) => Array(Math.min(Math.max(level, 1), 4)).fill('$').join('');

            return (
                <div className="min-h-screen text-gray-800 pb-10">
                    <header className="bg-orange-500 text-white shadow-md sticky top-0 z-20">
                        <div className="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <MapPin size={28} className="text-white" />
                                <h1 className="text-2xl font-bold tracking-wide">我的美食地圖</h1>
                            </div>
                            <div className="hidden md:block text-sm bg-orange-600 px-3 py-1 rounded-full">
                                收錄 {restaurants.length} 間餐廳
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
                        {/* 左側篩選面板 */}
                        <aside className="lg:col-span-1 space-y-6 bg-white p-5 rounded-xl shadow-sm border border-gray-100 h-fit sticky top-24">
                            <h2 className="text-lg font-bold border-b pb-2 flex items-center gap-2">
                                <Search size={18} /> 搜尋條件
                            </h2>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">想吃什麼？</label>
                                <input type="text" placeholder="搜尋店名或類型..." className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                            </div>
                            <div className="grid grid-cols-1 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">縣市</label>
                                    <select className="w-full p-2 border border-gray-300 rounded-lg outline-none" value={selectedCity} onChange={(e) => {setSelectedCity(e.target.value); setSelectedDistrict('');}}>
                                        <option value="">全部縣市</option>
                                        {Object.keys(TAIWAN_REGIONS).map(city => <option key={city} value={city}>{city}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">區域</label>
                                    <select className="w-full p-2 border border-gray-300 rounded-lg outline-none disabled:bg-gray-100" value={selectedDistrict} onChange={(e) => setSelectedDistrict(e.target.value)} disabled={!selectedCity}>
                                        <option value="">全部區域</option>
                                        {selectedCity && TAIWAN_REGIONS[selectedCity]?.map(dist => <option key={dist} value={dist}>{dist}</option>)}
                                    </select>
                                </div>
                            </div>
                        </aside>

                        {/* 右側列表 */}
                        <section className="lg:col-span-3 space-y-4">
                            {isLoading ? (
                                <div className="flex flex-col items-center justify-center h-64 bg-white rounded-xl shadow-sm border border-gray-100">
                                    <Loader2 size={48} className="text-orange-500 animate-spin mb-4" />
                                    <p className="text-gray-500 font-medium">讀取美食資料中...</p>
                                </div>
                            ) : error ? (
                                <div className="bg-red-50 p-6 rounded-xl text-center"><p className="text-red-600 font-bold mb-2">出錯了！</p><p className="text-sm text-red-500">{error}</p></div>
                            ) : (
                                <>
                                    <h2 className="text-xl font-bold mb-2">搜尋結果 ({filteredRestaurants.length})</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {filteredRestaurants.map((restaurant, idx) => (
                                            <div key={idx} className="bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow cursor-pointer border border-gray-100 group" onClick={() => setSelectedRestaurant(restaurant)}>
                                                <div className="relative h-40 overflow-hidden bg-gray-200">
                                                    <img src={restaurant.image} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
                                                </div>
                                                <div className="p-4">
                                                    <div className="flex justify-between items-start mb-1">
                                                        <h3 className="text-lg font-bold text-gray-900 line-clamp-1">{restaurant.name}</h3>
                                                        <div className="flex items-center text-orange-500 font-bold bg-orange-50 px-1.5 py-0.5 rounded shrink-0">
                                                            <Star size={14} className="fill-orange-500 mr-1" />{restaurant.rating}
                                                        </div>
                                                    </div>
                                                    <p className="text-sm text-gray-500 mb-2 truncate">{restaurant.foodType}</p>
                                                    <div className="flex items-center gap-3 text-sm text-gray-600 mb-3">
                                                        <div className="flex items-center text-green-700"><DollarSign size={14} /><span>{renderPrice(restaurant.priceLevel)}</span></div>
                                                        <span className="text-gray-300">|</span>
                                                        <div className="flex items-center truncate"><MapPin size={14} className="mr-1 text-gray-400 shrink-0" /><span className="truncate">{restaurant.city}{restaurant.district}</span></div>
                                                    </div>
                                                    <button className="w-full mt-2 bg-orange-50 text-orange-600 py-2 rounded-lg text-sm font-medium flex items-center justify-center gap-1">查看地圖 <ChevronRight size={16} /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </>
                            )}
                        </section>
                    </main>

                    {/* 詳細資訊 Modal */}
                    {selectedRestaurant && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-4xl max-h-[90vh] rounded-2xl shadow-2xl flex flex-col md:flex-row overflow-hidden relative">
                                <button className="absolute top-3 right-3 z-10 bg-black/50 hover:bg-black/80 text-white p-2 rounded-full" onClick={() => setSelectedRestaurant(null)}>
                                    <XIcon size={20} />
                                </button>
                                <div className="w-full md:w-1/2 flex flex-col h-64 md:h-auto bg-gray-100">
                                    <iframe width="100%" height="100%" style={{ border: 0 }} loading="lazy" allowFullScreen src={`https://maps.google.com/maps?q=${encodeURIComponent(selectedRestaurant.name + ' ' + selectedRestaurant.address)}&t=&z=15&ie=UTF8&iwloc=&output=embed`}></iframe>
                                </div>
                                <div className="w-full md:w-1/2 p-8 overflow-y-auto h-[50vh] md:h-auto">
                                    <span className="bg-orange-100 text-orange-700 text-xs px-2 py-1 rounded font-bold mb-3 inline-block">{selectedRestaurant.foodType}</span>
                                    <h2 className="text-3xl font-extrabold text-gray-900 mb-4">{selectedRestaurant.name}</h2>
                                    <div className="flex items-center gap-4 text-sm mb-6">
                                        <div className="flex items-center"><Star className="text-yellow-400 fill-yellow-400 mr-1" size={20} /><span className="font-bold text-lg">{selectedRestaurant.rating}</span></div>
                                        <div className="text-green-700 font-bold text-lg">{renderPrice(selectedRestaurant.priceLevel)}</div>
                                    </div>
                                    <div className="bg-gray-50 p-4 rounded-xl flex items-start gap-3 text-gray-700">
                                        <MapPin size={20} className="text-orange-500 shrink-0 mt-0.5"/> 
                                        <div><p className="font-bold mb-1">地址</p><p>{selectedRestaurant.address}</p></div>
                                    </div>
                                    <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(selectedRestaurant.name + ' ' + selectedRestaurant.address)}`} target="_blank" className="mt-8 w-full flex items-center justify-center gap-2 bg-blue-600 text-white py-3 rounded-xl font-bold">
                                        <Globe size={18} /> 在 Google Maps 開啟
                                    </a>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
